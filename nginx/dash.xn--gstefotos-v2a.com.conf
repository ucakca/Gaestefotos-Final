server {
    listen 65.109.71.182:80;
    server_name dash.xn--gstefotos-v2a.com dash.gaestefotos.com dash.gästefotos.com;
    return 301 https://$host$request_uri;
}

server {
    listen 65.109.71.182:443 ssl http2;

    server_name dash.xn--gstefotos-v2a.com dash.gaestefotos.com dash.gästefotos.com;

    ssl_certificate     /etc/letsencrypt/live/dash.xn--gstefotos-v2a.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dash.xn--gstefotos-v2a.com/privkey.pem;

    client_max_body_size 32m;

    # API routes → Backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Dashboard (Next.js auf Port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
