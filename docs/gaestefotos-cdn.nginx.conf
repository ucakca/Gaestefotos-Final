# ─── CDN / Storage Subdomain für gästefotos.com ─────────────────────────────
# Subdomain: cdn.gästefotos.com / cdn.xn--gstefotos-v2a.com
# Proxies direkt auf SeaweedFS S3 Gateway (localhost:8333)
#
# Setup nach dieser Datei:
#   ln -s /etc/nginx/sites-available/gaestefotos-cdn.conf /etc/nginx/sites-enabled/
#   certbot --nginx -d cdn.xn--gstefotos-v2a.com
#   nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name cdn.gästefotos.com cdn.xn--gstefotos-v2a.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://cdn.xn--gstefotos-v2a.com$request_uri;
    }
}

# HTTPS — CDN Proxy zu SeaweedFS S3 (Port 8333)
# HINWEIS: ssl_certificate Pfade nach certbot eintragen oder Plesk-Zertifikat verwenden
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cdn.gästefotos.com cdn.xn--gstefotos-v2a.com;

    # TODO: SSL-Zertifikat nach certbot / Plesk eintragen:
    # ssl_certificate     /etc/letsencrypt/live/cdn.xn--gstefotos-v2a.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cdn.xn--gstefotos-v2a.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:CDN_SSL:10m;

    # Logging
    access_log /var/log/nginx/cdn.gaestefotos.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/cdn.gaestefotos.error.log warn;

    # Proxy-Puffer
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;
    proxy_temp_file_write_size 64k;

    # ─── Statische Assets aus SeaweedFS ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8333;
        proxy_http_version 1.1;

        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — erlaubt app.gästefotos.com und alle Subdomains
        add_header Access-Control-Allow-Origin  "https://app.xn--gstefotos-v2a.com" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept-Encoding" always;
        add_header Access-Control-Max-Age       "86400" always;

        # Security
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header Referrer-Policy        "strict-origin"  always;

        # Immutable Cache für versionierte Assets (UUIDs als Dateinamen)
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Weiterleitungen von SeaweedFS erlauben
        proxy_redirect off;

        # Timeout
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # OPTIONS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://app.xn--gstefotos-v2a.com" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Accept-Encoding" always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }
    }

    # ─── Health-Check ────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8333/;
        proxy_http_version 1.1;
        add_header Content-Type "text/plain" always;
    }
}
