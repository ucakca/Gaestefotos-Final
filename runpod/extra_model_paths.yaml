# Extra model paths for RunPod Network Volume
# Network Volume is mounted at /runpod-volume
# Large models (WAN 2.1, etc.) are stored there to keep Docker image small

runpod_volume:
  base_path: /runpod-volume/models
  checkpoints: checkpoints/
  diffusion_models: diffusion_models/
  clip: clip/
  vae: vae/
  loras: loras/
  controlnet: controlnet/
